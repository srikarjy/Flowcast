name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build flowcast binary
        run: go build -o flowcast ./cmd/flowcast

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: flowcast
          generate_release_notes: true
